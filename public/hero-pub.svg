<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <!-- Background circle -->
  <circle cx="250" cy="250" r="230" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>
  <circle cx="250" cy="250" r="210" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Floor/base -->
  <rect x="80" y="340" width="340" height="8" rx="4" fill="#475569"/>

  <!-- Table -->
  <rect x="160" y="300" width="180" height="40" rx="6" fill="#78350f"/>
  <rect x="165" y="295" width="170" height="10" rx="3" fill="#92400e"/>
  <!-- Table legs -->
  <rect x="180" y="340" width="8" height="30" rx="2" fill="#78350f"/>
  <rect x="312" y="340" width="8" height="30" rx="2" fill="#78350f"/>

  <!-- Beer glass 1 -->
  <g transform="translate(195, 245)">
    <rect x="0" y="10" width="30" height="45" rx="3" fill="#fbbf24" opacity="0.85"/>
    <rect x="-2" y="10" width="34" height="8" rx="2" fill="#fcd34d" opacity="0.6"/>
    <rect x="0" y="0" width="30" height="14" rx="3" fill="#fef3c7" opacity="0.9"/>
    <rect x="8" y="55" width="14" height="4" rx="1" fill="#d97706"/>
    <rect x="4" y="59" width="22" height="3" rx="1.5" fill="#b45309"/>
  </g>

  <!-- Beer glass 2 -->
  <g transform="translate(275, 250)">
    <rect x="0" y="10" width="26" height="40" rx="3" fill="#f59e0b" opacity="0.8"/>
    <rect x="-2" y="10" width="30" height="7" rx="2" fill="#fcd34d" opacity="0.5"/>
    <rect x="0" y="0" width="26" height="12" rx="3" fill="#fef3c7" opacity="0.85"/>
    <rect x="6" y="50" width="14" height="3" rx="1" fill="#d97706"/>
    <rect x="3" y="53" width="20" height="3" rx="1.5" fill="#b45309"/>
  </g>

  <!-- Chair left -->
  <g transform="translate(120, 310)">
    <rect x="0" y="0" width="8" height="50" rx="2" fill="#64748b"/>
    <rect x="28" y="0" width="8" height="50" rx="2" fill="#64748b"/>
    <rect x="-2" y="-15" width="12" height="20" rx="3" fill="#475569"/>
    <rect x="0" y="5" width="36" height="6" rx="2" fill="#64748b"/>
  </g>

  <!-- Chair right -->
  <g transform="translate(345, 310)">
    <rect x="0" y="0" width="8" height="50" rx="2" fill="#64748b"/>
    <rect x="28" y="0" width="8" height="50" rx="2" fill="#64748b"/>
    <rect x="18" y="-15" width="12" height="20" rx="3" fill="#475569"/>
    <rect x="0" y="5" width="36" height="6" rx="2" fill="#64748b"/>
  </g>

  <!-- Pendant light -->
  <line x1="250" y1="60" x2="250" y2="140" stroke="#94a3b8" stroke-width="2"/>
  <path d="M225 140 Q225 130 250 130 Q275 130 275 140 L270 165 Q270 170 250 170 Q230 170 230 165 Z" fill="#f59e0b" opacity="0.9"/>
  <ellipse cx="250" cy="170" rx="18" ry="4" fill="#fbbf24" opacity="0.3"/>
  <!-- Light glow -->
  <ellipse cx="250" cy="170" rx="80" ry="40" fill="#fbbf24" opacity="0.05"/>
  <ellipse cx="250" cy="170" rx="50" ry="25" fill="#fbbf24" opacity="0.08"/>

  <!-- Decorative stars/sparkles -->
  <circle cx="150" cy="150" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="340" cy="130" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="130" cy="200" r="1" fill="#60a5fa" opacity="0.5"/>
  <circle cx="370" cy="190" r="1.5" fill="#60a5fa" opacity="0.4"/>
  <circle cx="180" cy="120" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="320" cy="170" r="1" fill="#fbbf24" opacity="0.3"/>

  <!-- "PP" text/logo on wall -->
  <rect x="215" y="85" width="70" height="35" rx="6" fill="#1e40af" opacity="0.8"/>
  <text x="250" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#e0e7ff">PP</text>

  <!-- Passport stamp decorative circle -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="8 6" opacity="0.3"/>
</svg>
